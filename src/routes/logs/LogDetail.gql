query LogDetail($id: ID!) {
	node(id: $id) {
		... on GameLog {
			id
			title
			brief
			synopsis
			summary
			gameDate
			url

			artifacts {
				edges {
					node {
						id
						name
					}
				}
			}
			associations {
				edges {
					node {
						id
						name
					}
				}
			}
			characters {
				edges {
					node {
						id
						name
					}
				}
			}
			items {
				edges {
					node {
						id
						name
					}
				}
			}
			places {
				edges {
					node {
						id
						name
					}
				}
			}
			races {
				edges {
					node {
						id
						name
					}
				}
			}
			placesSetIn {
				edges {
					node {
						id
						name
					}
				}
			}
		}
	}
}
