mutation UnlockLog($id: ID!) {
	unlock(input: { id: $id }) {
		__typename
		... on GameLog {
			id
			title
			brief
			synopsis
			gameDate
			url
			lockedBySelf
			lockTime
			lockUser {
				id
				username
				firstName
				lastName
			}

			artifacts {
				edges {
					node {
						id
						name
					}
				}
			}
			associations {
				edges {
					node {
						id
						name
					}
				}
			}
			characters {
				edges {
					node {
						id
						name
					}
				}
			}
			items {
				edges {
					node {
						id
						name
					}
				}
			}
			places {
				edges {
					node {
						id
						name
					}
				}
			}
			placesSetIn {
				edges {
					node {
						id
						name
					}
				}
			}
			races {
				edges {
					node {
						id
						name
					}
				}
			}
		}
	}
}
