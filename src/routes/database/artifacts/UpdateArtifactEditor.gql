mutation UpdateArtifactEditor(
	$id: ID!
	$name: String
	$description: String
	$markdownNotes: String
	$notes: String
	$items: [NodeInput!]
	$relatedArtifacts: [NodeInput!]
	$relatedAssociations: [NodeInput!]
	$relatedCharacters: [NodeInput!]
	$relatedItems: [NodeInput!]
	$relatedPlaces: [NodeInput!]
	$relatedRaces: [NodeInput!]
) {
	updateArtifact(
		input: {
			id: $id
			name: $name
			description: $description
			markdownNotes: $markdownNotes
			notes: $notes
			items: { set: $items }
			relatedArtifacts: { set: $relatedArtifacts }
			relatedAssociations: { set: $relatedAssociations }
			relatedCharacters: { set: $relatedCharacters }
			relatedItems: { set: $relatedItems }
			relatedPlaces: { set: $relatedPlaces }
			relatedRaces: { set: $relatedRaces }
		}
	) {
		__typename
		... on Artifact {
			id
			name
			description
			markdownNotes
			notes
			imageIds
			lockedBySelf
			lockUser {
				id
				username
				firstName
				lastName
			}
			items {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedArtifacts {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedAssociations {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedCharacters {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedItems {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedPlaces {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedRaces {
				edges {
					node {
						id
						name
					}
				}
			}
			logs(order: { gameDate: DESC }) {
				edges {
					node {
						id
						title
						url
					}
				}
			}
		}
		... on OperationInfo {
			messages {
				code
				field
				kind
				message
			}
		}
	}
}
