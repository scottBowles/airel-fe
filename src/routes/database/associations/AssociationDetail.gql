query AssociationDetail($id: ID!) {
	node(id: $id) {
		... on Association {
			id
			name
			description
			markdownNotes
			imageIds
			characters {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedArtifacts {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedAssociations {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedCharacters {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedItems {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedPlaces {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedRaces {
				edges {
					node {
						id
						name
					}
				}
			}
			logs {
				edges {
					node {
						id
						title
						url
					}
				}
			}
		}
	}
}
