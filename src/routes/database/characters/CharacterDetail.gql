query CharacterDetail($id: ID!) {
	node(id: $id) {
		... on Character {
			id
			name
			description
			markdownNotes
			size
			imageIds
			lockedBySelf
			lockUser {
				id
				username
				firstName
				lastName
			}
			race {
				id
				name
			}
			associations {
				edges {
					node {
						id
						name
					}
				}
			}

			# Related entities
			relatedArtifacts {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedAssociations {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedCharacters {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedItems {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedPlaces {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedRaces {
				edges {
					node {
						id
						name
					}
				}
			}

			# Log appearances
			logs(order: { gameDate: DESC }) {
				edges {
					node {
						id
						title
						url
					}
				}
			}
		}
	}
}
