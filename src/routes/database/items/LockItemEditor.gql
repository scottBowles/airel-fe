mutation LockItemEditor($id: ID!) {
	lock(input: { id: $id }) {
		__typename
		... on Item {
			id
			name
			description
			markdownNotes
			imageIds
			lockedBySelf
			lockUser {
				id
				username
				firstName
				lastName
			}
			artifacts {
				edges {
					node {
						id
						name
					}
				}
			}
			armor {
				acBonus
			}
			equipment {
				briefDescription
			}
			weapon {
				attackBonus
			}
			relatedArtifacts {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedAssociations {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedCharacters {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedItems {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedPlaces {
				edges {
					node {
						id
						name
					}
				}
			}
			relatedRaces {
				edges {
					node {
						id
						name
					}
				}
			}
			logs(order: { gameDate: DESC }) {
				edges {
					node {
						id
						title
						url
					}
				}
			}
		}
	}
}
