query EntityEditorOptions {
	artifacts {
		edges {
			node {
				id
				name
			}
		}
	}
	associations {
		edges {
			node {
				id
				name
			}
		}
	}
	characters {
		edges {
			node {
				id
				name
			}
		}
	}
	items {
		edges {
			node {
				id
				name
			}
		}
	}
	places {
		edges {
			node {
				id
				name
				placeType
				parent {
					name
				}
			}
		}
	}
	races {
		edges {
			node {
				id
				name
			}
		}
	}
}
